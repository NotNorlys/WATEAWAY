<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Escape</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

  <section class="hero" id="hero">
    <video autoplay muted loop playsinline id="heroVideo">
      <source src="https://cdn.coverr.co/videos/coverr-tropical-sunset-1580/1080p.mp4" type="video/mp4">
    </video>

    <div class="hero-fade"></div>

    <div class="overlay">
      <div class="hero-panel">
        <h1 id="heroTitle">Luxury Escape</h1>
        <div class="hero-line"></div>
        <p id="tripDates">SEPTEMBER 5 — 13</p>

        <div id="favBox">❤️ Favorito: <strong>Ninguno</strong></div>
      </div>
    </div>
  </section>

  <main class="container">

    <!-- CONTROLES (NUEVO) -->
    <section class="controls">
      <div class="controls-left">
        <div class="field">
          <label>Buscar</label>
          <input id="searchInput" type="text" placeholder="Ej: Bali, Tokyo, Maldives..." />
        </div>

        <div class="field">
          <label>Tipo</label>
          <select id="typeSelect">
            <option value="all">Todos</option>
            <option value="playa">Playa</option>
            <option value="ciudad">Ciudad</option>
            <option value="naturaleza">Naturaleza</option>
            <option value="crucero">Crucero</option>
          </select>
        </div>

        <div class="field">
          <label>Ordenar</label>
          <select id="sortSelect">
            <option value="fav">Favorito primero</option>
            <option value="dayAsc">$/día (menor → mayor)</option>
            <option value="dayDesc">$/día (mayor → menor)</option>
            <option value="totalAsc">$ total (menor → mayor)</option>
            <option value="totalDesc">$ total (mayor → menor)</option>
            <option value="name">Nombre (A→Z)</option>
          </select>
        </div>
      </div>

      <div class="controls-right">
        <div class="count-pill">
          Mostrando: <strong id="countText">0</strong>
        </div>
        <button class="btn btn-outline-dark" id="clearFiltersBtn" type="button">Limpiar</button>
      </div>
    </section>

    <!-- CHART -->
    <section class="chart-wrap">
      <div class="chart-head">
        <h2>Comparación precio por día</h2>
        <div class="chart-sub">Basado en 9 días (Sept 5–13)</div>
      </div>
      <canvas id="priceChart"></canvas>
    </section>

    <!-- MAPA -->
    <section class="map-wrap">
      <div class="map-head">
        <h2>Mapa interactivo</h2>
        <div class="map-sub">Zoom + toca marcador para ver / elegir</div>
      </div>
      <div id="mapIndex"></div>
    </section>

    <!-- CARDS -->
    <section>
      <div class="section-title">
        <h2>Destinos</h2>
        <div class="section-sub">El favorito sube arriba automáticamente</div>
      </div>
      <div id="cards"></div>
    </section>

  </main>

  <footer>Luxury Escape • Beige Tropical Aesthetic</footer>

  <!-- Música (solo index) -->
  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>
  <button id="musicBtn" class="music-btn" type="button" aria-label="Música">🔇</button>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
